    environment:
      PYTHONUNBUFFERED: "1"

  dah-fault-injector:
    profiles: ["cyber-lab"]
    build: .
    container_name: dah-fault-injector
    command:
      - python
      - -m
      - dah_services.fault_injector_service
    expose:
