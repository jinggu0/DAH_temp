      - uas-utm-edge
      - --service-url
      - http://dah-gcs:8080
      - --edge-id
      - edge-dronebot-01
      - --device-type
      - uav_edge
      - --asset
      - small-dronebot-01
      - --authority
      - ROKA UTM Cell
      - --software-version
      - edge-dev
      - --emit-sample-telemetry
    depends_on:
      - dah-gcs
    networks:
      - dah-asset-net
      - dah-ops-net
    environment:
      PYTHONUNBUFFERED: "1"

  # ── 사이버 공격 시나리오 컨테이너 (profile: cyber-attack) ──────────────
  # 실행: docker compose --profile cyber-attack up dah-attack-gnss-drift
  dah-attack-gnss-drift:
    profiles: ["cyber-attack"]
    build: .
    container_name: dah-attack-gnss-drift
    command:
      - python
      - -m
      - dah_attacks.gnss_drift_attack
      - --service-url
      - http://dah-gcs:8080
      - --target-asset
      - small-dronebot-01
      - --spoof-edge-id
      - edge-attack-gnss-01
      - --drift-rate
      - "0.6"
      - --duration-s
      - "120"
    depends_on:
      dah-gcs:
        condition: service_healthy
    networks:
      - dah-ops-net
      - dah-asset-net
