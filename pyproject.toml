[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dah-smu-harness"
version = "0.1.0"
description = "UAV/UGV cyber defense test harness for DAH 2026"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
dah-harness = "dah_harness.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dah_harness = ["py.typed"]
